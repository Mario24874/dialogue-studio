[build]
  # Después de compilar, copiamos .next/static/ a .next/_next/static/
  # Con publish=".next", el CDN sirve .next/ como raíz del sitio.
  # El HTML siempre pide /_next/static/..., pero sin el subdirectorio _next/
  # dentro de .next/, el CDN no encuentra los archivos → 404.
  # La copia garantiza que /_next/static/ exista en el CDN.
  command = "npm run build && mkdir -p .next/_next && cp -r .next/static .next/_next/"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Headers de seguridad ────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Assets estáticos Next.js: inmutables (content-hash en nombre) ───────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Webhook de Stripe: sin caché ─────────────────────────────────────────────
[[headers]]
  for = "/api/stripe/webhook"
  [headers.values]
    Cache-Control = "no-store"

# ── Rutas de Clerk ────────────────────────────────────────────────────────────
[[redirects]]
  from = "/sign-in"
  to = "/sign-in"
  status = 200

[[redirects]]
  from = "/sign-up"
  to = "/sign-up"
  status = 200
